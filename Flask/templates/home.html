<!DOCTYPE html>
<html>
<head>
    <title>Loan Approval Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body{
            font-family:Arial;
            background:#f2f2f2;
            text-align:center;
        }
        .box{
            width:700px;
            margin:80px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }
        h1{
            background:green;
            color:white;
            padding:15px;
            border-radius:5px;
        }
        button{
            background:green;
            color:white;
            border:none;
            padding:12px 25px;
            font-size:18px;
            border-radius:5px;
            cursor:pointer;
        }
        button:hover{
            background:darkgreen;
        }
    </style>
</head>

<body>

<div class="box">
    <h1>Loan Approval Prediction System</h1>

    <p>
        This application predicts whether a loan application is likely to be approved
        based on applicant details such as income, education, loan amount,
        credit history and property area.
    </p>

    <br>

    <a href="/form">
        <button>Predict Loan Approval</button>
    </a>

</div>

</body>
</html>
