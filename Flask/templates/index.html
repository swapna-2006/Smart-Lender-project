<!DOCTYPE html>
<html>
<head>
    <title>Enter Your Details for Loan Approval Prediction</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">
    <div class="card shadow-lg p-4">

    <h1>Enter Your Details for Loan Approval Prediction</h1>
    <h3>Fill the form for prediction</h3>

    <form action="/predict" method="POST">

        <label>Name</label>
        <input type="text" name="Name" class="form-control mb-3" placeholder="Enter your Name" required>

        <label>Email ID</label>
        <input type="email" name="Email" class="form-control mb-3" placeholder="Enter your Email" required>

        <label>Mobile Number</label>
        <input type="text" name="Phone" class="form-control mb-3" placeholder="Enter your Mobile Number" required>

        <label>Gender</label>
        <select name="Gender" class="form-select mb-3">
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
        </select>

        <label>Married</label>
        <select name="Married" required>
            <option value="">Select Status</option>
            <option>Yes</option>
            <option>No</option>
        </select>

        <label>Dependents</label>
        <select name="Dependents" required>
            <option value="">Select</option>
            <option>0</option>
            <option>1</option>
            <option>2</option>
            <option>3+</option>
        </select>

        <label>Education</label>
        <select name="Education" required>
            <option value="">Select</option>
            <option>Graduate</option>
            <option>Not Graduate</option>
        </select>

        <label>Self Employed</label>
        <select name="Self_Employed" required>
            <option value="">Select</option>
            <option>Yes</option>
            <option>No</option>
        </select>

        <label>Applicant Income</label>
        <input type="number" name="ApplicantIncome" class="form-control mb-3" placeholder="Enter Applicant Income" required>

        <label>Co Applicant Income</label>
        <input type="number" name="CoapplicantIncome" class="form-control mb-3" placeholder="Enter Co Applicant Income" required>

        <label>Loan Amount</label>
        <input type="number" name="LoanAmount" class="form-control mb-3" placeholder="Enter Loan Amount" required>

        <label>Loan Amount Term</label>
        <input type="number" name="Loan_Amount_Term" class="form-control mb-3" placeholder="Enter Loan Amount Term" required>

        <label>Credit History</label>
        <select name="Credit_History" class="form-select mb-3" required>
            <option value="">Select</option>
            <option value="1">Good (1)</option>
            <option value="0">Bad (0)</option>
        </select>

        <label>Property Area</label>
        <select name="Property_Area" required>
            <option value="">Select</option>
            <option>Urban</option>
            <option>Semiurban</option>
            <option>Rural</option>
        </select>

        <input type="submit"
       value="Predict Loan Approval"
       class="btn btn-success w-100">

    </form>

</div>

</body>
</html>
